<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP CIDR Calculator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>IP Calculator</h1>
      </header>

      <section class="card">
        <div class="field">
          <input
            id="network-input"
            name="network"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="IP/prefix (v4/v6) or IP/subnet (v4)"
          />
        </div>

        <p id="error-message" class="error" aria-live="polite"></p>
      </section>

      <section id="results" class="card results hidden" aria-live="polite">
        <div id="result-list" class="result-list"></div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
